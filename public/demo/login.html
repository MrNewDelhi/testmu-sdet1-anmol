<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Self-Healing Login Demo</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f7fb;
        color: #172033;
      }

      main {
        width: min(420px, calc(100vw - 32px));
        padding: 28px;
        border: 1px solid #d8e0ec;
        border-radius: 8px;
        background: #ffffff;
      }

      label,
      input,
      button {
        display: block;
        width: 100%;
      }

      label {
        margin-top: 16px;
        font-size: 14px;
        font-weight: 700;
      }

      input {
        box-sizing: border-box;
        margin-top: 6px;
        padding: 10px 12px;
        border: 1px solid #aab7c8;
        border-radius: 6px;
      }

      button {
        margin-top: 20px;
        padding: 11px 14px;
        border: 0;
        border-radius: 6px;
        background: #1769e0;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }

      #status {
        margin-top: 16px;
        min-height: 20px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main aria-label="Login demo">
      <h1>Login</h1>
      <form id="login-form">
        <label for="input-email">Email</label>
        <input id="input-email" name="email" type="email" autocomplete="username" />

        <label for="input-password">Password</label>
        <input id="input-password" name="password" type="password" autocomplete="current-password" />

        <button id="actual-login-submit" type="submit" data-testid="login-submit">Sign in</button>
      </form>
      <p id="status" aria-live="polite"></p>
    </main>

    <script>
      document.querySelector('#login-form').addEventListener('submit', (event) => {
        event.preventDefault();
        document.querySelector('#status').textContent = 'Login submitted';
      });
    </script>
  </body>
</html>
