<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Self-Healing Disambiguation Demo</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f4f7fb; color: #172033; }
      header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 12px 20px; background: #ffffff; border-bottom: 1px solid #d8e0ec;
      }
      nav a { margin-left: 16px; color: #1769e0; text-decoration: none; font-weight: 700; }
      main {
        width: min(420px, calc(100vw - 32px)); margin: 40px auto; padding: 28px;
        border: 1px solid #d8e0ec; border-radius: 8px; background: #ffffff;
      }
      label, input, button { display: block; width: 100%; }
      label { margin-top: 16px; font-size: 14px; font-weight: 700; }
      input {
        box-sizing: border-box; margin-top: 6px; padding: 10px 12px;
        border: 1px solid #aab7c8; border-radius: 6px;
      }
      button {
        margin-top: 20px; padding: 11px 14px; border: 0; border-radius: 6px;
        background: #1769e0; color: white; font-weight: 700; cursor: pointer;
      }
      #status { margin-top: 16px; min-height: 20px; font-weight: 700; }
    </style>
  </head>
  <body>
    <!-- Decoy: a header nav link that also reads "Login" but only NAVIGATES. -->
    <header>
      <strong>TestMu Shop</strong>
      <nav aria-label="Primary">
        <a id="nav-login" href="?route=account/login">Login</a>
        <a id="nav-register" href="?route=account/register">Register</a>
      </nav>
    </header>

    <main aria-label="Login demo">
      <h1>Login</h1>
      <!-- The real target: the submit button, whose label changed to "Sign in". -->
      <form id="login-form">
        <label for="input-email">Email</label>
        <input id="input-email" name="email" type="email" autocomplete="username" />

        <label for="input-password">Password</label>
        <input id="input-password" name="password" type="password" autocomplete="current-password" />

        <button id="actual-login-submit" type="submit" data-testid="login-submit">Sign in</button>
      </form>
      <p id="status" aria-live="polite"></p>
    </main>

    <script>
      document.querySelector('#login-form').addEventListener('submit', (event) => {
        event.preventDefault();
        document.querySelector('#status').textContent = 'Login submitted';
      });
      // If the header link were (wrongly) healed and clicked, it would navigate
      // rather than submit — the exact mistake the contract check prevents.
      document.querySelector('#nav-login').addEventListener('click', (event) => {
        event.preventDefault();
        document.querySelector('#status').textContent = 'Navigated via header link';
      });
    </script>
  </body>
</html>
